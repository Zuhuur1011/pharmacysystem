<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Pharmacy Expiry Alerts System - Inventory</title>
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/inventory.css" />
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">
                <span class="pill-icon">💊</span>
                <h2>PHARMACY<br>EXPIRY ALERTS<br>SYSTEM</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="Dashboard.html" class="nav-item">🏠 Dashboard</a>
                <a href="Inventory.html" class="nav-item active">📦 Inventory</a>
                <a href="Alerts.html" class="nav-item">🔔 Alerts</a>
                <a href="Reports.html" class="nav-item">📊 Reports</a>
                <a href="Settings.html" class="nav-item">⚙️ Settings</a>
                <a href="Users.html" class="nav-item">👥 Users</a>
            </nav>
            <div class="sidebar-footer">
                <p>🛡️ Smart Inventory.<br>Timely Alerts.<br>Better Care.</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div>
                    <h1>Inventory</h1>
                    <p class="subtitle">Manage your medicine stock</p>
                </div>
                <button class="add-btn" onclick="openModal()">+ Add Medicine</button>
            </header>

            <section class="panel">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Batch No.</th>
                            <th>Qty</th>
                            <th>Expiry Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTableBody">
                        <tr><td colspan="5">Loading...</td></tr>
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div id="medicineModal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <h2 id="modalTitle">Add Medicine</h2>
            <form id="medicineForm">
                <input type="hidden" id="medicineId" />

                <label for="name">Name</label>
                <input type="text" id="name" required />

                <label for="batchNumber">Batch Number</label>
                <input type="text" id="batchNumber" required />

                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" required min="0" />

                <label for="expiryDate">Expiry Date</label>
                <input type="date" id="expiryDate" required />

                <div class="modal-actions">
                    <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="save-btn">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/inventory.js"></script>
</body>
</html>
